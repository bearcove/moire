name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: bearcove-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "25"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Frontend build
        working-directory: frontend
        run: pnpm build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generated frontend types are up to date
        run: pnpm types:check

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cargo check
        run: cargo check --workspace --all-features

      - name: Cargo nextest
        run: cargo nextest run --workspace --all-features

  moire-targets:
    runs-on: bearcove-ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check moire on Linux host
        run: cargo check -p moire --features diagnostics

      - name: Check moire on wasm32-unknown-unknown
        run: cargo check -p moire --target wasm32-unknown-unknown --features diagnostics
